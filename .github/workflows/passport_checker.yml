name: Passport Appointment Checker

# Runs every 30 minutes between 06:00–22:00 UTC (09:00–01:00 Israel time).
# Government offices are closed at night so no point checking then.
# NOTE: GitHub only runs scheduled workflows from the DEFAULT branch (main/master).
# After reviewing this PR, merge it to main so the cron activates.
# You can also trigger a manual run any time via:
#   GitHub → Actions → Passport Appointment Checker → Run workflow
on:
  schedule:
    # Every 30 min, hours 6–22 UTC (≈ 09:00–01:00 Israel time)
    - cron: "*/30 6-22 * * *"
  workflow_dispatch:   # manual trigger (works on any branch)

jobs:
  check:
    runs-on: ubuntu-22.04

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 2. Python setup
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: passport_checker/requirements.txt

      - name: Install Python dependencies
        run: pip install -r passport_checker/requirements.txt

      # -----------------------------------------------------------------------
      # 3. Playwright (headless Chromium)
      # -----------------------------------------------------------------------
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # -----------------------------------------------------------------------
      # 4. Restore saved session from secret
      #    The session is base64-encoded JSON from `python checker.py --export`
      # -----------------------------------------------------------------------
      - name: Restore session file
        env:
          PASSPORT_SESSION: ${{ secrets.PASSPORT_SESSION }}
        run: |
          if [ -z "$PASSPORT_SESSION" ]; then
            echo "ERROR: PASSPORT_SESSION secret is not set."
            echo "Run 'python passport_checker/checker.py --setup' locally, then"
            echo "'python passport_checker/checker.py --export', and add the output"
            echo "as a GitHub Secret named PASSPORT_SESSION."
            exit 1
          fi
          echo "$PASSPORT_SESSION" | base64 -d > passport_checker/session.json
          echo "Session file restored."

      # -----------------------------------------------------------------------
      # 5. Restore config (appointment URL) from secret
      #    APPOINTMENT_URL overrides config.json so no file commit is needed.
      # -----------------------------------------------------------------------

      # -----------------------------------------------------------------------
      # 6. Run the checker
      # -----------------------------------------------------------------------
      - name: Run passport checker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PASSPORT_SESSION: ${{ secrets.PASSPORT_SESSION }}
          APPOINTMENT_URL: ${{ secrets.APPOINTMENT_URL }}
        run: python passport_checker/checker.py

      # -----------------------------------------------------------------------
      # 7. Upload screenshot as artifact for debugging
      # -----------------------------------------------------------------------
      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: last-check-screenshot
          path: passport_checker/last_check.png
          retention-days: 3
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # 8. Commit updated slot state back to the repo
      #    [skip ci] prevents this commit from re-triggering the workflow.
      # -----------------------------------------------------------------------
      - name: Commit updated slot state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add passport_checker/known_slots.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to known_slots.json – nothing to commit."
          else
            git commit -m "chore: update passport slot state [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
